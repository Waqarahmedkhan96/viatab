
name: VIATAB CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:
  ci:
    name: Test, Build and Dockerize
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend tests
        working-directory: VIATAB/backend/viatab-backend
        run: mvn test

      - name: Build backend jar
        working-directory: VIATAB/backend/viatab-backend
        run: mvn clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: VIATAB/frontend/viatab-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: VIATAB/frontend/viatab-frontend
        run: npm ci

      - name: Build frontend
        working-directory: VIATAB/frontend/viatab-frontend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t viatab-backend:latest ./VIATAB/backend/viatab-backend

      - name: Build frontend Docker image
        run: docker build -t viatab-frontend:latest ./VIATAB/frontend/viatab-frontend

   cd:
    name: Deploy to Minikube
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21 for deployment
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend jar for deployment
        working-directory: VIATAB/backend/viatab-backend
        run: mvn clean package -DskipTests

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest

      - name: Build backend image inside Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t viatab-backend:latest ./VIATAB/backend/viatab-backend